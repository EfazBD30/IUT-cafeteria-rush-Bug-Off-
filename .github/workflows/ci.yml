name: IUT Cafeteria Rush CI

# run this pipeline on every push to main
# and on every pull request to main
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-tests:
    name: Install and Test
    runs-on: ubuntu-latest

    steps:
      # step 1: checkout the code from github
      - name: Checkout code
        uses: actions/checkout@v3

      # step 2: install node js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # step 3: install dependencies from root package.json
      - name: Install root dependencies
        run: npm install

      # step 4: install jsonwebtoken for tests
      - name: Install test dependencies
        run: npm install jsonwebtoken

      # step 5: run all jest tests
      - name: Run tests
        run: npm test

      # step 6: show result
      - name: Tests passed
        run: echo "All tests passed successfully!"